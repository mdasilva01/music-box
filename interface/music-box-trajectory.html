<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Box Trajectory Generator</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Mono:wght@300;400&display=swap");

      :root {
        --sky: #aaddf5;
        --navy: #2d3170;
        --cream: #faf8f5;
        --orange: #c45c2a;
        --purple: #7c3aed;
        --panel-bg: rgba(255, 255, 255, 0.45);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background: var(--sky);
        font-family: "DM Mono", monospace;
      }

      .app {
        width: 100vw;
        height: 100vh;
        background: var(--sky);
        padding: 28px;
        position: relative;
        overflow: hidden;
      }

      .app-inner {
        display: flex;
        gap: 20px;
        align-items: flex-start;
        height: calc(100vh - 56px);
      }

      .main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: 100%;
      }

      .title-block {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .title-block h1 {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 2rem;
        color: #1a1f4e;
        line-height: 1.15;
        letter-spacing: -0.01em;
      }

      .help-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        flex-shrink: 0;
        border-radius: 50%;
        background: var(--cream);
        border: 1.5px solid rgba(44, 49, 112, 0.18);
        color: #555;
        font-size: 13px;
        cursor: pointer;
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-weight: 700;
        transition:
          background 0.2s,
          box-shadow 0.2s;
        user-select: none;
      }
      .help-btn:hover {
        background: #e8f5fc;
        box-shadow: 0 2px 8px rgba(44, 49, 112, 0.12);
      }

      .canvas-wrap {
        position: relative;
        width: 100%;
        flex: 1;
      }
      canvas#trajectory {
        display: block;
        width: 100%;
        height: 100%;
        cursor: default;
      }

      .sidebar {
        width: 200px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
        height: 100%;
      }

      .panel {
        background: var(--panel-bg);
        border: 1.5px solid rgba(255, 255, 255, 0.7);
        border-radius: 14px;
        padding: 14px;
        backdrop-filter: blur(6px);
      }

      .panel h2 {
        font-family: "Playfair Display", serif;
        font-size: 1.35rem;
        color: #1a1f4e;
        margin-bottom: 10px;
      }

      .panel.figures-panel {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .tools-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .tool-btn {
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(44, 49, 112, 0.15);
        border-radius: 8px;
        padding: 6px 10px;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        cursor: pointer;
        color: #2d3170;
        transition: background 0.15s;
        text-align: left;
      }
      .tool-btn:hover {
        background: rgba(255, 255, 255, 0.95);
      }
      .tool-btn.active {
        background: var(--navy);
        color: #fff;
      }
      .tool-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }

      .figures-panel h2 {
        flex-shrink: 0;
      }

      .figures-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
        flex: 1;
        padding-right: 2px;
      }

      .figure-card {
        background: rgba(255, 255, 255, 0.8);
        border: 1.5px solid rgba(44, 49, 112, 0.12);
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        font-size: 11px;
        color: #555;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .figure-card:hover {
        border-color: var(--navy);
        box-shadow: 0 2px 8px rgba(44, 49, 112, 0.12);
      }
      .figure-card.active {
        border-color: var(--purple);
      }
      .figure-icon {
        font-size: 26px;
        flex-shrink: 0;
      }

      .help-overlay {
        position: absolute;
        inset: 0;
        background: rgba(60, 60, 60, 0.88);
        z-index: 100;
        display: none;
        cursor: pointer;
      }
      .help-overlay.visible {
        display: block;
      }

      .help-tip {
        position: absolute;
        color: #e8e8e8;
        font-size: 12px;
        font-family: "DM Mono", monospace;
        line-height: 1.7;
        max-width: 155px;
      }

      .dismiss-hint {
        position: absolute;
        bottom: 20px;
        left: 0;
        right: 0;
        text-align: center;
        color: #999;
        font-size: 13px;
        font-family: "Playfair Display", serif;
        font-style: italic;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="app-inner" id="mainUI">
        <div class="main-area">
          <div class="title-block">
            <h1>Music Box Trajectory Generator</h1>
            <button class="help-btn" id="helpBtn">?</button>
          </div>
          <div class="canvas-wrap">
            <canvas id="trajectory"></canvas>
          </div>
        </div>

        <div class="sidebar">
          <div class="panel">
            <h2>Tools</h2>
            <div class="tools-list">
              <button class="tool-btn active" id="toolDrag">
                ✦ Drag Points
              </button>
              <button class="tool-btn" id="toolReset">↺ Reset Shape</button>
              <button class="tool-btn" id="toolAnimate">▶ Preview</button>
              <button class="tool-btn" id="toolSubmit">✔ Submit</button>
              <div style="display: flex; gap: 6px; margin-top: 2px">
                <button
                  class="tool-btn"
                  id="toolUndo"
                  style="flex: 1; text-align: center"
                  disabled
                >
                  Undo
                </button>
                <button
                  class="tool-btn"
                  id="toolRedo"
                  style="flex: 1; text-align: center"
                  disabled
                >
                  Redo
                </button>
              </div>
            </div>
          </div>
          <div class="panel figures-panel">
            <h2>Figures</h2>
            <div class="figures-grid">
              <div class="figure-card active" data-fig="dancer">
                <span class="figure-icon">🩰</span>dancer
              </div>
              <div class="figure-card" data-fig="bear">
                <span class="figure-icon">🐻</span>bear
              </div>
              <div class="figure-card" data-fig="star">
                <span class="figure-icon">⭐</span>star
              </div>
              <div class="figure-card" data-fig="robot">
                <span class="figure-icon">🤖</span>robot
              </div>
              <div class="figure-card" data-fig="cat">
                <span class="figure-icon">🐱</span>cat
              </div>
              <div class="figure-card" data-fig="butterfly">
                <span class="figure-icon">🦋</span>butterfly
              </div>
              <div class="figure-card" data-fig="crown">
                <span class="figure-icon">👑</span>crown
              </div>
              <div class="figure-card" data-fig="bird">
                <span class="figure-icon">🐦</span>bird
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="help-overlay" id="helpOverlay">
        <div
          class="help-tip"
          id="tipCircle"
          style="text-align: center; max-width: 200px; font-size: 13px"
        >
          Click and drag the white points<br />to reshape your trajectory
        </div>
        <div class="help-tip" style="bottom: 12%; left: 22%">
          Four-bar linkage<br />preview shown here
        </div>
        <div class="help-tip" style="top: 8%; right: 28px; text-align: right">
          This side panel contains controls &amp; figure selection
        </div>
        <div class="dismiss-hint">Click anywhere to dismiss</div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("trajectory");
      const ctx = canvas.getContext("2d");

      function setupCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        return { w: rect.width, h: rect.height };
      }

      let W,
        H,
        trajectoryPoints = [],
        dragging = null;
      let animating = false,
        animT = 0,
        animFrame = null;
      const POINT_RADIUS = 9,
        NUM_POINTS = 6;

      function initPoints(w, h) {
        const cx = w * 0.55,
          cy = h * 0.48,
          r = Math.min(w, h) * 0.32;
        trajectoryPoints = [];
        for (let i = 0; i < NUM_POINTS; i++) {
          const angle = (i / NUM_POINTS) * Math.PI * 2 - Math.PI / 2;
          trajectoryPoints.push({
            x: cx + Math.cos(angle) * r,
            y: cy + Math.sin(angle) * r,
          });
        }
      }

      function catmullRomPath(pts, closed = true) {
        if (pts.length < 2) return;
        const p = closed ? [...pts, pts[0], pts[1], pts[2]] : pts;
        ctx.beginPath();
        for (let i = 0; i < (closed ? pts.length : pts.length - 1); i++) {
          const p0 = p[i === 0 ? (closed ? pts.length - 1 : 0) : i - 1] || p[i];
          const p1 = p[i],
            p2 = p[i + 1],
            p3 = p[i + 2] || p[i + 1];
          for (let t = 0; t <= 20; t++) {
            const s = t / 20,
              s2 = s * s,
              s3 = s2 * s;
            const x =
              0.5 *
              (2 * p1.x +
                (-p0.x + p2.x) * s +
                (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * s2 +
                (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * s3);
            const y =
              0.5 *
              (2 * p1.y +
                (-p0.y + p2.y) * s +
                (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * s2 +
                (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * s3);
            if (i === 0 && t === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
        }
        if (closed) ctx.closePath();
      }

      function getCatmullRomPoint(pts, t) {
        const n = pts.length,
          seg = t * n,
          i = Math.floor(seg) % n,
          s = seg - Math.floor(seg);
        const p0 = pts[(i - 1 + n) % n],
          p1 = pts[i],
          p2 = pts[(i + 1) % n],
          p3 = pts[(i + 2) % n];
        const s2 = s * s,
          s3 = s2 * s;
        return {
          x:
            0.5 *
            (2 * p1.x +
              (-p0.x + p2.x) * s +
              (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * s2 +
              (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * s3),
          y:
            0.5 *
            (2 * p1.y +
              (-p0.y + p2.y) * s +
              (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * s2 +
              (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * s3),
        };
      }

      function drawLinkage(w, h) {
        const lx = w * 0.05,
          ly = h * 0.62,
          lw = w * 0.28,
          lh = h * 0.3;
        const A = { x: lx + lw * 0.12, y: ly + lh * 0.6 },
          D = { x: lx + lw * 0.88, y: ly + lh * 0.6 };
        const crankLen = lh * 0.38;
        const B = {
          x: A.x + Math.cos(animT * Math.PI * 2) * crankLen,
          y: A.y + Math.sin(animT * Math.PI * 2) * crankLen,
        };
        const connLen = lh * 0.55,
          follLen = lh * 0.42;
        const dx = D.x - B.x,
          dy = D.y - B.y,
          dist = Math.sqrt(dx * dx + dy * dy);
        let C;
        if (dist < connLen + follLen && dist > Math.abs(connLen - follLen)) {
          const a =
            (connLen * connLen - follLen * follLen + dist * dist) / (2 * dist);
          const h2 = Math.sqrt(Math.max(0, connLen * connLen - a * a));
          C = {
            x: B.x + (a * dx) / dist + (h2 * dy) / dist,
            y: B.y + (a * dy) / dist - (h2 * dx) / dist,
          };
        } else {
          C = { x: B.x + connLen * 0.7, y: B.y - connLen * 0.3 };
        }

        ctx.strokeStyle = "rgba(30,30,30,0.35)";
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(A.x - 10, A.y + 2);
        ctx.lineTo(D.x + 10, D.y + 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.lineWidth = 2.5;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#2d3170";
        ctx.beginPath();
        ctx.moveTo(A.x, A.y);
        ctx.lineTo(B.x, B.y);
        ctx.stroke();
        ctx.strokeStyle = "#1a1f4e";
        ctx.beginPath();
        ctx.moveTo(B.x, B.y);
        ctx.lineTo(C.x, C.y);
        ctx.stroke();
        ctx.strokeStyle = "#2d3170";
        ctx.beginPath();
        ctx.moveTo(C.x, C.y);
        ctx.lineTo(D.x, D.y);
        ctx.stroke();
        [
          [A, "#c45c2a"],
          [B, "#fff"],
          [C, "#7c3aed"],
          [D, "#c45c2a"],
        ].forEach(([pt, col]) => {
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
          ctx.fillStyle = col;
          ctx.fill();
          ctx.strokeStyle = "#222";
          ctx.lineWidth = 1.2;
          ctx.stroke();
        });
        ctx.fillStyle = "#333";
        ctx.font = "italic 11px Playfair Display,serif";
        ctx.fillText("A", A.x - 14, A.y - 4);
        ctx.fillStyle = "rgba(50,50,80,0.7)";
        ctx.font = "18px DM Mono,monospace";
        ctx.fillText("Output Preview", lx + lw * 0.3, ly + lh + 12);
        const tr = [];
        for (let t2 = 0; t2 < 1; t2 += 0.01) {
          const ang = t2 * Math.PI * 2,
            Bt = {
              x: A.x + Math.cos(ang) * crankLen,
              y: A.y + Math.sin(ang) * crankLen,
            };
          const dx2 = D.x - Bt.x,
            dy2 = D.y - Bt.y,
            d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
          if (d2 < connLen + follLen && d2 > Math.abs(connLen - follLen)) {
            const a2 =
              (connLen * connLen - follLen * follLen + d2 * d2) / (2 * d2);
            const h3 = Math.sqrt(Math.max(0, connLen * connLen - a2 * a2));
            tr.push({
              x: Bt.x + (a2 * dx2) / d2 + (h3 * dy2) / d2,
              y: Bt.y + (a2 * dy2) / d2 - (h3 * dx2) / d2,
            });
          }
        }
        if (tr.length > 2) {
          ctx.beginPath();
          ctx.moveTo(tr[0].x, tr[0].y);
          tr.forEach((p) => ctx.lineTo(p.x, p.y));
          ctx.closePath();
          ctx.strokeStyle = "rgba(124,58,237,0.28)";
          ctx.lineWidth = 1.2;
          ctx.setLineDash([3, 3]);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        ctx.save();
        catmullRomPath(trajectoryPoints, true);
        ctx.strokeStyle = "#2d3170";
        ctx.lineWidth = 2.8;
        ctx.shadowColor = "rgba(44,49,112,0.18)";
        ctx.shadowBlur = 8;
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
        if (animating) {
          const pt = getCatmullRomPoint(trajectoryPoints, animT);
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, 7, 0, Math.PI * 2);
          ctx.fillStyle = "#c45c2a";
          ctx.shadowColor = "#c45c2a";
          ctx.shadowBlur = 12;
          ctx.fill();
          ctx.shadowBlur = 0;
        }
        trajectoryPoints.forEach((pt, i) => {
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, POINT_RADIUS, 0, Math.PI * 2);
          ctx.fillStyle = dragging === i ? "#aaddf5" : "#ffffff";
          ctx.strokeStyle = "#2d3170";
          ctx.lineWidth = 2;
          ctx.fill();
          ctx.stroke();
        });
        drawLinkage(W, H);
      }

      function animate() {
        if (!animating) return;
        animT = (animT + 0.004) % 1;
        draw();
        animFrame = requestAnimationFrame(animate);
      }

      function getPos(e) {
        const rect = canvas.getBoundingClientRect(),
          touch = e.touches ? e.touches[0] : e;
        return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
      }
      function hitTest(pos) {
        for (let i = 0; i < trajectoryPoints.length; i++)
          if (
            Math.hypot(
              pos.x - trajectoryPoints[i].x,
              pos.y - trajectoryPoints[i].y,
            ) <
            POINT_RADIUS + 4
          )
            return i;
        return null;
      }

      let undoStack = [],
        redoStack = [];
      function snapshot() {
        undoStack.push(trajectoryPoints.map((p) => ({ ...p })));
        redoStack = [];
        updateUndoRedo();
      }
      function updateUndoRedo() {
        document.getElementById("toolUndo").disabled = undoStack.length === 0;
        document.getElementById("toolRedo").disabled = redoStack.length === 0;
      }

      canvas.addEventListener("mousedown", (e) => {
        const hit = hitTest(getPos(e));
        if (hit !== null) {
          snapshot();
          dragging = hit;
          canvas.style.cursor = "grabbing";
        }
      });
      canvas.addEventListener("mousemove", (e) => {
        const pos = getPos(e);
        if (dragging !== null) {
          trajectoryPoints[dragging].x = pos.x;
          trajectoryPoints[dragging].y = pos.y;
          draw();
        } else canvas.style.cursor = hitTest(pos) !== null ? "grab" : "default";
      });
      canvas.addEventListener("mouseup", () => {
        dragging = null;
        canvas.style.cursor = "default";
      });
      canvas.addEventListener("mouseleave", () => {
        dragging = null;
      });
      canvas.addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault();
          const hit = hitTest(getPos(e));
          if (hit !== null) {
            snapshot();
            dragging = hit;
          }
        },
        { passive: false },
      );
      canvas.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          if (dragging !== null) {
            const pos = getPos(e);
            trajectoryPoints[dragging].x = pos.x;
            trajectoryPoints[dragging].y = pos.y;
            draw();
          }
        },
        { passive: false },
      );
      canvas.addEventListener("touchend", () => {
        dragging = null;
      });

      document.getElementById("helpBtn").addEventListener("click", () => {
        const cr = canvas.getBoundingClientRect(),
          ar = document.querySelector(".app").getBoundingClientRect();
        const tip = document.getElementById("tipCircle");
        tip.style.left = cr.left - ar.left + W * 0.55 * (cr.width / W) + "px";
        tip.style.top = cr.top - ar.top + H * 0.48 * (cr.height / H) + "px";
        tip.style.transform = "translate(-50%,-50%)";
        document.getElementById("helpOverlay").classList.add("visible");
      });
      document
        .getElementById("helpOverlay")
        .addEventListener("click", () =>
          document.getElementById("helpOverlay").classList.remove("visible"),
        );

      document.getElementById("toolReset").addEventListener("click", () => {
        snapshot();
        initPoints(W, H);
        draw();
      });
      document.getElementById("toolUndo").addEventListener("click", () => {
        if (!undoStack.length) return;
        redoStack.push(trajectoryPoints.map((p) => ({ ...p })));
        trajectoryPoints = undoStack.pop();
        updateUndoRedo();
        draw();
      });
      document.getElementById("toolRedo").addEventListener("click", () => {
        if (!redoStack.length) return;
        undoStack.push(trajectoryPoints.map((p) => ({ ...p })));
        trajectoryPoints = redoStack.pop();
        updateUndoRedo();
        draw();
      });
      document
        .getElementById("toolAnimate")
        .addEventListener("click", function () {
          animating = !animating;
          this.textContent = animating ? "⏹ Stop" : "▶ Preview";
          this.classList.toggle("active", animating);
          document
            .getElementById("toolDrag")
            .classList.toggle("active", !animating);
          if (animating) animate();
          else {
            cancelAnimationFrame(animFrame);
            draw();
          }
        });
      document.querySelectorAll(".figure-card").forEach((card) =>
        card.addEventListener("click", function () {
          document
            .querySelectorAll(".figure-card")
            .forEach((c) => c.classList.remove("active"));
          this.classList.add("active");
        }),
      );

      window.addEventListener("resize", () => {
        const { w, h } = setupCanvas();
        W = w;
        H = h;
        initPoints(w, h);
        draw();
      });
      (function () {
        const { w, h } = setupCanvas();
        W = w;
        H = h;
        initPoints(w, h);
        draw();
      })();
    </script>
  </body>
</html>
